alias eq_amby    "slot1; r_drawviewmodel 1; viewmodel_fov 100; alias sw_up eq_watch;   alias sw_down eq_sapper; alias current_fov viewmodel_fov 100; alias q_key eq_sapper_from_amby"
alias eq_sapper  "slot2; r_drawviewmodel 1; viewmodel_fov 100; alias sw_up eq_amby;    alias sw_down eq_knife;  alias current_fov viewmodel_fov 100; alias q_key eq_amby"
alias eq_knife   "slot3; r_drawviewmodel 1; viewmodel_fov 0.1; alias sw_up eq_sapper;  alias sw_down eq_watch;  alias current_fov viewmodel_fov 0.1; alias q_key eq_amby"
alias eq_watch   "slot4; r_drawviewmodel 1; viewmodel_fov 100; alias sw_up eq_knife;   alias sw_down eq_amby;   alias current_fov viewmodel_fov 100; alias q_key eq_knife"

alias eq_sapper_from_amby "eq_sapper; alias q_key eq_amby"
alias eq_knife_from_amby  "eq_knife; alias q_key eq_amby"

bind "1" "eq_amby"
bind "2" "eq_sapper; alias eq_sapper_from_amby eq_sapper"
bind "3" "eq_knife;  alias eq_sapper_from_amby eq_knife"
bind "4" "eq_watch"

bind "MWHEELUP"   "sw_up"
bind "MWHEELDOWN" "sw_down"
bind "q"          "q_key"
alias +amby_zoom "fov_desired 75"
alias -amby_zoom "fov_desired 90"
bind "MOUSE3" "+amby_zoom"
bind "e"      "voicemenu 0 0"
bind "z"      "voice_menu_1"

alias +dr_hold "viewmodel_fov 100; +attack2"
alias -dr_hold "viewmodel_fov 0.1; -attack2"
bind "MOUSE2" "+dr_hold"

alias +spy_attack "+attack; spec_next"
alias -spy_attack "-attack; current_fov"
bind "MOUSE1" "+spy_attack"
