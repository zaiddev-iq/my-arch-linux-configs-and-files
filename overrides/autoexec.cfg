// 1. الإعدادات البصرية وحجم الأسلحة الافتراضي المفضل لديك
viewmodel_fov 100        // يجعل حجم الأسلحة 100 لجميع الشخصيات تلقائيًا فور تشغيل اللعبة
fov_desired 90           // يمنحك أوسع زاوية رؤية ممكنة للشاشة (الوضع الاحترافي)
r_drawviewmodel 1        // التأكد من أن الأسلحة ظاهرة ومعتمة بشكل طبيعي عند بدء اللعب

// 2. تفعيل رندر الأسلحة الشفافة والمخصصة
r_hudhistoricalweaponcustomization 1

// 3. تحسينات جودة اللعب (Quality of Life)
cl_autoreload 1          // تفعيل إعادة تعبئة الذخيرة تلقائيًا (مهم جدًا للـ Amby)
tf_medichealyerself 1    // إذا لعبت بالميديك، يعالج نفسه تلقائيًا عند الضغط
hud_fastswitch 1         // التنقل السريع والمباشر بين الأسلحة بدون الحاجة لتأكيد الاختيار بالفأرة

exec spy.cfg

// 4. إعدادات الشبكة الاحترافية (Network Rates & Interp)
rate 786432              // أقصى معدل نقل بيانات مسموح به في اللعبة لمنع الـ Lag
cl_cmdrate 66            // مزامنة إرسال البيانات مع خوادم اللعبة (66 tickrate)
cl_updaterate 66         // مزامنة استقبال البيانات من الخوادم
cl_interp_ratio 2        // القيمة الآمنة والمستقرة التي تفضلها لمنع التقطيع
cl_interp 0              // إجبار اللعبة على حساب أقل interp ممكن بناءً على الـ ratio
cl_lagcompensation 1     // تفعيل ميزة تعويض التأخير لضمان دقة تسجيل الضربات
cl_pred_optimize 2       // تحسين أداء التنبؤ بالحركة داخل محرك اللعبة
